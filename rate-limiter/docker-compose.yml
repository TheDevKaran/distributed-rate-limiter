version: '3.9'

services:

  app:
    build: .
    ports:
      - "8080:8080"

    depends_on:
      - redis
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rate_limiter
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      REDIS_HOST: redis
      REDIS_PORT: 6379

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: rate_limiter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  prometheus:

    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - app

  grafana:

    image: grafana/grafana

    ports:
      - "3001:3000"

    depends_on:
      - prometheus
